        <RadioPage DefaultOption="disableIpv6__true" IsRequired="true" Description="Classic tweak, often overused. redcore OS asks it directly instead of hiding it behind a vague “network tweak” checkbox.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable IPv6</Text>
                    <Name>disableIpv6__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep IPv6 enabled</Text>
                    <Name>disableIpv6__false</Name>
