        <RadioPage DefaultOption="reduceMitigations__true" IsRequired="true" Description="This is the exact kind of question that makes or breaks credibility: the performance folklore is real enough to ask about, but the security cost is real too. In our current playbook this maps to the SSBD-side mitigation reduction path.">
            <Options>
                <RadioOption>
                    <Text>Yes — reduce those mitigations</Text>
                    <Name>reduceMitigations__true</Name>
