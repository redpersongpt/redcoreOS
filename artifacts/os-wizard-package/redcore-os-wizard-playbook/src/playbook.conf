<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>redcore-os-default</Name>
    <Username>redcore</Username>
    <Title>redcore OS Playbook</Title>
    <ShortDescription>Windows optimization playbook for redcore OS</ShortDescription>
    <Description>A review-first Windows optimization playbook that stages cleanup, privacy hardening, and performance tuning through a guided wizard.</Description>
    <Details>redcore OS scans the current install, resolves a profile-aware plan, and packages the same decisions for wizard and ISO flows.</Details>
    <Version>1.0</Version>
    <UniqueId>2cb0ed8d-2d5b-4e74-9c0d-df83cc3ab4d4</UniqueId>
    <UpgradableFrom>any</UpgradableFrom>
    <SupportedBuilds>
        <string>19045</string>
        <string>22631</string>
        <string>26100</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>NoPendingUpdates</Requirement>
        <Requirement>Internet</Requirement>
        <Requirement>PluggedIn</Requirement>
    </Requirements>
    <UseKernelDriver>false</UseKernelDriver>
    <ProductCode>410</ProductCode>
    <Git>https://github.com/redpersongpt/redcore-OS</Git>
    <Website>https://redcoreos.net</Website>
    <DonateLink>https://redcoreos.net</DonateLink>
    <SupportsISO>true</SupportsISO>
    <ISO>
        <DisableBitLocker>true</DisableBitLocker>
        <DisableHardwareRequirements>true</DisableHardwareRequirements>
    </ISO>
    <OOBE>
        <BulletPoints>
            <BulletPoint Icon="Rocket" Title="Lower Latency" Description="Stages the same timer, power, and scheduler optimizations exposed by the desktop wizard."/>
            <BulletPoint Icon="Privacy" Title="Telemetry Control" Description="Removes the worst consumer tracking defaults without pretending every enterprise feature can disappear."/>
            <BulletPoint Icon="Lock" Title="Rollback Ready" Description="Keeps rollback metadata so the plan can be audited and reversed instead of acting like a blind tweak pack."/>
        </BulletPoints>
        <Internet>Request</Internet>
    </OOBE>
    <FeaturePages>
        <RadioPage DefaultOption="aggressionPreset__conservative" IsRequired="true" Description="This is the mainline preset. It decides how much of the playbook is eligible before your per-question answers start forcing things in or out.">
            <Options>
                <RadioOption>
                    <Text>Conservative</Text>
                    <Name>aggressionPreset__conservative</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Balanced</Text>
                    <Name>aggressionPreset__balanced</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Aggressive</Text>
                    <Name>aggressionPreset__aggressive</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Expert</Text>
                    <Name>aggressionPreset__expert</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="highPerformancePlan__true" IsRequired="true" Description="This forces Windows away from the default power-saving bias so the CPU stops dipping as aggressively between bursts.">
            <Options>
                <RadioOption>
                    <Text>Yes — use High Performance</Text>
                    <Name>highPerformancePlan__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Windows power defaults</Text>
                    <Name>highPerformancePlan__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="optimizeThreadPriority__true" IsRequired="true" Description="This maps to Win32PrioritySeparation. It pushes the active foreground workload ahead of background noise.">
            <Options>
                <RadioOption>
                    <Text>Yes — bias CPU time toward the active app</Text>
                    <Name>optimizeThreadPriority__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Windows scheduler defaults</Text>
                    <Name>optimizeThreadPriority__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="globalTimerResolution__true" IsRequired="true" Description="This is the real Windows 11 timer question redcore OS can honestly apply: whether the system should honor global timer-resolution behavior again.">
            <Options>
                <RadioOption>
                    <Text>Yes — restore global timer behavior</Text>
                    <Name>globalTimerResolution__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep modern per-process timer behavior</Text>
                    <Name>globalTimerResolution__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableIndexing__true" IsRequired="true" Description="Indexing keeps background I/O and CPU pressure around so Start and Explorer search stay fast. Turning it off trades convenience for quietness.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable indexing</Text>
                    <Name>disableIndexing__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep indexing enabled</Text>
                    <Name>disableIndexing__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="stripSearchWebNoise__true" IsRequired="true" Description="This cuts the Microsoft content layer around Search without pretending to fully remove SearchHost.">
            <Options>
                <RadioOption>
                    <Text>Yes — shrink Search to a local-only utility</Text>
                    <Name>stripSearchWebNoise__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Windows Search extras</Text>
                    <Name>stripSearchWebNoise__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="keepPrinterSupport__true" IsRequired="true" Description="If yes, redcore OS will preserve the Print Spooler. If no, it will cut it.">
            <Options>
                <RadioOption>
                    <Text>Yes — preserve printer support</Text>
                    <Name>keepPrinterSupport__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — safe to disable printing services</Text>
                    <Name>keepPrinterSupport__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="keepRemoteAccess__true" IsRequired="true" Description="If yes, redcore OS preserves remote-access related services. If no, it trims that attack surface.">
            <Options>
                <RadioOption>
                    <Text>Yes — preserve remote access capability</Text>
                    <Name>keepRemoteAccess__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — disable remote access services</Text>
                    <Name>keepRemoteAccess__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="edgeBehavior__keep" IsRequired="true" Description="This question stays on the honest side: preload, nags, and updates are separable; full browser removal is asked separately.">
            <Options>
                <RadioOption>
                    <Text>Keep Edge unchanged</Text>
                    <Name>edgeBehavior__keep</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Suppress background preload and default-browser nags</Text>
                    <Name>edgeBehavior__suppress</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Suppress Edge and also freeze auto-updates</Text>
                    <Name>edgeBehavior__suppress-and-freeze</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableCopilot__true" IsRequired="true" Description="This removes the Copilot taskbar surface and its associated shell noise.">
            <Options>
                <RadioOption>
                    <Text>Yes — remove Copilot from the shell</Text>
                    <Name>disableCopilot__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Copilot available</Text>
                    <Name>disableCopilot__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableRecall__true" IsRequired="true" Description="Recall is one of the easiest “yes” questions in the whole flow unless you explicitly want AI timeline snapshots.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable Recall</Text>
                    <Name>disableRecall__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Recall available</Text>
                    <Name>disableRecall__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableClickToDo__true" IsRequired="true" Description="This trims another Windows 11 AI shell surface that most tuned machines do not need.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable it</Text>
                    <Name>disableClickToDo__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep it available</Text>
                    <Name>disableClickToDo__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableAiApps__true" IsRequired="true" Description="This cuts the bundled AI surfaces in Microsoft apps rather than only the headline shell features.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable app-level AI features</Text>
                    <Name>disableAiApps__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep those AI features</Text>
                    <Name>disableAiApps__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="telemetryLevel__keep" IsRequired="true" Description="This controls the real telemetry actions in the playbook rather than vague “privacy mode” marketing.">
            <Options>
                <RadioOption>
                    <Text>Keep Windows telemetry behavior</Text>
                    <Name>telemetryLevel__keep</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Reduce telemetry</Text>
                    <Name>telemetryLevel__reduce</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Aggressive telemetry reduction</Text>
                    <Name>telemetryLevel__aggressive</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableClipboardHistory__true" IsRequired="true" Description="Useful if you want the clipboard to behave like a simple local buffer again.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable clipboard history/sync</Text>
                    <Name>disableClipboardHistory__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep clipboard history</Text>
                    <Name>disableClipboardHistory__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableActivityFeed__true" IsRequired="true" Description="This trims the timeline-style “what you were doing” surfaces and associated cloud content behavior.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable it</Text>
                    <Name>disableActivityFeed__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep that behavior</Text>
                    <Name>disableActivityFeed__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableLocation__true" IsRequired="true" Description="A good privacy answer for desktops. A more situational one for laptops that actually use location-based workflows.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable location-linked features</Text>
                    <Name>disableLocation__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep location available</Text>
                    <Name>disableLocation__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableTailoredExperiences__true" IsRequired="true" Description="This removes the “Windows learns from you” layer instead of only the obvious ad toggles.">
            <Options>
                <RadioOption>
                    <Text>Yes — cut that personalization layer</Text>
                    <Name>disableTailoredExperiences__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep it</Text>
                    <Name>disableTailoredExperiences__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableSpeechPersonalization__true" IsRequired="true" Description="This cuts cloud speech/input collection behavior that most stripped systems do not need.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable it</Text>
                    <Name>disableSpeechPersonalization__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep it</Text>
                    <Name>disableSpeechPersonalization__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableSmartScreen__true" IsRequired="true" Description="This is a real tradeoff question. It reduces Windows friction, but it also removes one of the last browser/download guardrails people forget they were relying on.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable SmartScreen</Text>
                    <Name>disableSmartScreen__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep SmartScreen</Text>
                    <Name>disableSmartScreen__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableFastStartup__true" IsRequired="true" Description="Fast Startup often leaves stale driver/kernel state around. Tuned systems usually benefit from clean boots.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable Fast Startup</Text>
                    <Name>disableFastStartup__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Fast Startup</Text>
                    <Name>disableFastStartup__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableHibernation__true" IsRequired="true" Description="For most tuned desktops this is a yes. For laptops it depends on whether you actually use hibernate.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable hibernation</Text>
                    <Name>disableHibernation__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep hibernation</Text>
                    <Name>disableHibernation__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableAudioEnhancements__true" IsRequired="true" Description="DSP and enhancement layers are often needless overhead unless you intentionally rely on them.">
            <Options>
                <RadioOption>
                    <Text>Yes — turn enhancements off</Text>
                    <Name>disableAudioEnhancements__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep enhancements</Text>
                    <Name>disableAudioEnhancements__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="enableAudioExclusiveMode__true" IsRequired="true" Description="This helps users who want a cleaner low-latency audio path and are okay with apps taking exclusive control of the device.">
            <Options>
                <RadioOption>
                    <Text>Yes — enable exclusive mode</Text>
                    <Name>enableAudioExclusiveMode__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep the current shared-mode behavior</Text>
                    <Name>enableAudioExclusiveMode__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="restoreClassicContextMenu__true" IsRequired="true" Description="A pure usability question, but one with a real apply-side effect.">
            <Options>
                <RadioOption>
                    <Text>Yes — restore the classic menu</Text>
                    <Name>restoreClassicContextMenu__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep the stock menu</Text>
                    <Name>restoreClassicContextMenu__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="enableEndTask__true" IsRequired="true" Description="This is the exact Windows 11 usability tweak you asked for: kill hung apps straight from taskbar right-click without opening Task Manager.">
            <Options>
                <RadioOption>
                    <Text>Yes — add End Task</Text>
                    <Name>enableEndTask__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep default taskbar right-click behavior</Text>
                    <Name>enableEndTask__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableBackgroundApps__true" IsRequired="true" Description="This is a real resource-control question. It matters more than a lot of flashy “FPS tweaks.”">
            <Options>
                <RadioOption>
                    <Text>Yes — stop background app execution</Text>
                    <Name>disableBackgroundApps__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep background apps allowed</Text>
                    <Name>disableBackgroundApps__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableAutomaticMaintenance__true" IsRequired="true" Description="This trades background housekeeping for a quieter machine. Good for dedicated tuned PCs; less good for people who want Windows to self-maintain.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable it</Text>
                    <Name>disableAutomaticMaintenance__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep it</Text>
                    <Name>disableAutomaticMaintenance__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="enableGameMode__true" IsRequired="true" Description="This is the lightweight Windows-native gaming toggle, not a magical optimization. But if you game, it still belongs in the questionnaire.">
            <Options>
                <RadioOption>
                    <Text>Yes — enable Game Mode</Text>
                    <Name>enableGameMode__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep current Game Mode behavior</Text>
                    <Name>enableGameMode__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableTransparency__true" IsRequired="true" Description="Small tweak, but real. Cuts acrylic/blur visual noise and a bit of compositor overhead.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable transparency</Text>
                    <Name>disableTransparency__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep transparency</Text>
                    <Name>disableTransparency__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="aggressiveBoostMode__true" IsRequired="true" Description="This keeps the CPU pushing harder under load instead of backing off into friendlier boost policy behavior.">
            <Options>
                <RadioOption>
                    <Text>Yes — use aggressive boost</Text>
                    <Name>aggressiveBoostMode__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep stock boost policy</Text>
                    <Name>aggressiveBoostMode__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="minProcessorState100__true" IsRequired="true" Description="This is the “don’t dip clocks between bursts” question. It is one of the cleaner CPU responsiveness levers in the current playbook.">
            <Options>
                <RadioOption>
                    <Text>Yes — keep the floor at 100%</Text>
                    <Name>minProcessorState100__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — allow Windows to downscale more freely</Text>
                    <Name>minProcessorState100__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableCoreParking__true" IsRequired="true" Description="Classic enthusiast latency question. Useful on many desktop gaming systems, less sensible on weaker or office-centric machines.">
            <Options>
                <RadioOption>
                    <Text>Yes — unpark cores</Text>
                    <Name>disableCoreParking__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep core parking behavior</Text>
                    <Name>disableCoreParking__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="gamingMmcss__true" IsRequired="true" Description="This hardens the scheduler profile used for Games under Windows’ multimedia scheduling system.">
            <Options>
                <RadioOption>
                    <Text>Yes — apply the tuned gaming profile</Text>
                    <Name>gamingMmcss__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep MMCSS defaults</Text>
                    <Name>gamingMmcss__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableMemoryCompression__true" IsRequired="true" Description="A sensible question on machines with enough RAM. On RAM-starved systems, the answer can be different.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable memory compression</Text>
                    <Name>disableMemoryCompression__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep memory compression</Text>
                    <Name>disableMemoryCompression__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableHags__true" IsRequired="true" Description="HAGS is system-specific. The point here is not blind faith, it is making the choice explicit.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable HAGS</Text>
                    <Name>disableHags__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep HAGS at the Windows default</Text>
                    <Name>disableHags__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableGpuTelemetry__true" IsRequired="true" Description="Cleans out the always-on driver analytics layer without pretending the GPU driver itself is the problem.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable GPU telemetry</Text>
                    <Name>disableGpuTelemetry__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep GPU telemetry services</Text>
                    <Name>disableGpuTelemetry__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableGameDvr__true" IsRequired="true" Description="This is still one of the most sensible gaming questions to ask because the action is real and the downside is clear.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable Game DVR</Text>
                    <Name>disableGameDvr__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Game DVR behavior</Text>
                    <Name>disableGameDvr__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableFullscreenOptimizations__true" IsRequired="true" Description="Useful for users chasing predictable fullscreen behavior and lower input-path weirdness.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable them</Text>
                    <Name>disableFullscreenOptimizations__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep them enabled</Text>
                    <Name>disableFullscreenOptimizations__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableDynamicTick__true" IsRequired="true" Description="This is a proper enthusiast question pulled from the real playbook, not a marketing placeholder.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable dynamic tick</Text>
                    <Name>disableDynamicTick__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep dynamic tick</Text>
                    <Name>disableDynamicTick__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="removeEdge__true" IsRequired="true" Description="This is where the tone changes from cleanup to irreversible system surgery.">
            <Options>
                <RadioOption>
                    <Text>Yes — remove Edge</Text>
                    <Name>removeEdge__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep the browser installed</Text>
                    <Name>removeEdge__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="preserveWebView2__true" IsRequired="true" Description="This question exists because too many debloat tools pretend WebView2 is “just Edge” and then people wonder why app surfaces start breaking.">
            <Options>
                <RadioOption>
