                <RadioOption>
                    <Text>No — keep HVCI enabled</Text>
                    <Name>disableHvci__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableLlmnr__true" IsRequired="true" Description="A sensible hardening/cleanup protocol question that many tuned systems can say yes to.">
