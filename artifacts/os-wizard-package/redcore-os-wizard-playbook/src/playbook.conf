        <RadioPage DefaultOption="disableTeredo__true" IsRequired="true" Description="Useful if you want legacy Microsoft tunneling layers out of the way.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable Teredo</Text>
                    <Name>disableTeredo__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Teredo</Text>
                    <Name>disableTeredo__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableNetbios__true" IsRequired="true" Description="A very specific question, but the kind that is actually consequential on the right systems.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable NetBIOS</Text>
                    <Name>disableNetbios__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep NetBIOS</Text>
                    <Name>disableNetbios__false</Name>
                </RadioOption>
            </Options>
