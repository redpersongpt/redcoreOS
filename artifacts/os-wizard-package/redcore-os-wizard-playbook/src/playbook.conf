                <RadioOption>
                    <Text>Yes — disable LLMNR</Text>
                    <Name>disableLlmnr__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep LLMNR</Text>
                    <Name>disableLlmnr__false</Name>
                </RadioOption>
            </Options>
