<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>redcore-os-default</Name>
    <Username>redcore</Username>
    <Title>redcore OS Playbook</Title>
    <ShortDescription>Windows optimization playbook for redcore OS</ShortDescription>
    <Description>A review-first Windows optimization playbook that stages cleanup, privacy hardening, and performance tuning through a guided wizard.</Description>
    <Details>redcore OS scans the current install, resolves a profile-aware plan, and packages the same decisions for wizard and ISO flows.</Details>
    <Version>1.0</Version>
    <UniqueId>2cb0ed8d-2d5b-4e74-9c0d-df83cc3ab4d4</UniqueId>
    <UpgradableFrom>any</UpgradableFrom>
    <SupportedBuilds>
        <string>19045</string>
        <string>22631</string>
        <string>26100</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>NoPendingUpdates</Requirement>
        <Requirement>Internet</Requirement>
        <Requirement>PluggedIn</Requirement>
    </Requirements>
    <UseKernelDriver>false</UseKernelDriver>
    <ProductCode>410</ProductCode>
    <Git>https://github.com/redpersongpt/redcoreOS</Git>
    <Website>https://redcoreos.net</Website>
    <DonateLink>https://redcoreos.net</DonateLink>
    <SupportsISO>true</SupportsISO>
    <ISO>
        <DisableBitLocker>true</DisableBitLocker>
        <DisableHardwareRequirements>true</DisableHardwareRequirements>
    </ISO>
    <OOBE>
        <BulletPoints>
            <BulletPoint Icon="Rocket" Title="Lower Latency" Description="Stages the same timer, power, and scheduler optimizations exposed by the desktop wizard."/>
            <BulletPoint Icon="Privacy" Title="Telemetry Control" Description="Removes the worst consumer tracking defaults without pretending every enterprise feature can disappear."/>
            <BulletPoint Icon="Lock" Title="Rollback Ready" Description="Keeps rollback metadata so the plan can be audited and reversed instead of acting like a blind tweak pack."/>
        </BulletPoints>
        <Internet>Request</Internet>
    </OOBE>
    <FeaturePages>
        <RadioPage DefaultOption="aggressionPreset__conservative" IsRequired="true" Description="This decides how many changes we make. Start safe, or go deeper if you know what you&apos;re doing.">
            <Options>
                <RadioOption>
                    <Text>Conservative</Text>
                    <Name>aggressionPreset__conservative</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Balanced</Text>
                    <Name>aggressionPreset__balanced</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Aggressive</Text>
                    <Name>aggressionPreset__aggressive</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Expert</Text>
                    <Name>aggressionPreset__expert</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="highPerformancePlan__true" IsRequired="true" Description="This stops Windows from slowing down your CPU to save power. Your PC will respond faster. Sets powercfg to High Performance scheme and adjusts processor idle states.">
            <Options>
                <RadioOption>
                    <Text>Yes — use High Performance</Text>
                    <Name>highPerformancePlan__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Windows power defaults</Text>
                    <Name>highPerformancePlan__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="optimizeThreadPriority__true" IsRequired="true" Description="Adjusts Win32PrioritySeparation to favor foreground processes. Makes the scheduler give your active app (game, editor) more quantum time than background services.">
            <Options>
                <RadioOption>
                    <Text>Yes — prioritize the active app</Text>
                    <Name>optimizeThreadPriority__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep default sharing</Text>
                    <Name>optimizeThreadPriority__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="globalTimerResolution__true" IsRequired="true" Description="Windows 11 changed timer resolution to per-process (24H2+). This sets GlobalTimerResolutionRequests=1 to restore the global 0.5ms timer that games rely on for consistent frame pacing.">
            <Options>
                <RadioOption>
                    <Text>Yes — restore global timer behavior</Text>
                    <Name>globalTimerResolution__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep modern per-app timer</Text>
                    <Name>globalTimerResolution__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableIndexing__true" IsRequired="true" Description="WSearch service constantly scans files in the background. Disabling it stops the indexer, reduces disk I/O, and frees ~100-200MB RAM.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable indexing</Text>
                    <Name>disableIndexing__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep indexing enabled</Text>
                    <Name>disableIndexing__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="stripSearchWebNoise__true" IsRequired="true" Description="Removes web results, search highlights, and the oversized search bar from the taskbar.">
            <Options>
                <RadioOption>
                    <Text>Yes — local search only</Text>
                    <Name>stripSearchWebNoise__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep full search</Text>
                    <Name>stripSearchWebNoise__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="keepPrinterSupport__true" IsRequired="true" Description="If you don&apos;t print, we can safely disable the print service. This also removes a known security vulnerability.">
            <Options>
                <RadioOption>
                    <Text>Yes — I use a printer</Text>
                    <Name>keepPrinterSupport__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — I don&apos;t print</Text>
                    <Name>keepPrinterSupport__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="keepRemoteAccess__true" IsRequired="true" Description="Remote Desktop lets others control your PC over the network. If nobody needs to access this PC remotely, we can disable it for better security.">
            <Options>
                <RadioOption>
                    <Text>Yes — I need remote access</Text>
                    <Name>keepRemoteAccess__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — nobody accesses this PC remotely</Text>
                    <Name>keepRemoteAccess__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="edgeBehavior__keep" IsRequired="true" Description="Edge runs 3-5 background processes even when closed, pre-loads at boot, and nags you to switch from your preferred browser. It&apos;s like that friend who won&apos;t leave your party.">
            <Options>
                <RadioOption>
                    <Text>Keep Edge unchanged</Text>
                    <Name>edgeBehavior__keep</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Suppress background preload and default-browser nags</Text>
                    <Name>edgeBehavior__suppress</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Suppress Edge and also freeze auto-updates</Text>
                    <Name>edgeBehavior__suppress-and-freeze</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableCopilot__true" IsRequired="true" Description="Copilot is Microsoft&apos;s AI assistant wedged into the taskbar. Uses 150-300MB RAM sitting idle and phones home to Bing. Nobody asked for this.">
            <Options>
                <RadioOption>
                    <Text>Yes — remove Copilot</Text>
                    <Name>disableCopilot__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Copilot available</Text>
                    <Name>disableCopilot__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableRecall__true" IsRequired="true" Description="Recall takes screenshots of your screen every few seconds so AI can search your history. Yes, really. It stores everything locally but the concept is... concerning.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable Recall</Text>
                    <Name>disableRecall__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Recall available</Text>
                    <Name>disableRecall__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableClickToDo__true" IsRequired="true" Description="Click to Do is a Windows 11 AI feature that analyzes what&apos;s on your screen and suggests actions.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable it</Text>
                    <Name>disableClickToDo__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep it available</Text>
                    <Name>disableClickToDo__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableAiApps__true" IsRequired="true" Description="Microsoft added AI to several built-in apps. These send your data to the cloud for processing.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable app AI features</Text>
                    <Name>disableAiApps__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep AI features</Text>
                    <Name>disableAiApps__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="telemetryLevel__keep" IsRequired="true" Description="Windows sends usage data, app crash reports, typing/inking data, and browsing patterns to Microsoft via DiagTrack service and scheduled tasks.">
            <Options>
                <RadioOption>
                    <Text>Keep Windows defaults</Text>
                    <Name>telemetryLevel__keep</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Reduce data collection</Text>
                    <Name>telemetryLevel__reduce</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Maximum privacy</Text>
                    <Name>telemetryLevel__aggressive</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableClipboardHistory__true" IsRequired="true" Description="Windows can save everything you copy and sync it across devices. If you don&apos;t use this, it&apos;s just extra tracking.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable clipboard history/sync</Text>
                    <Name>disableClipboardHistory__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep clipboard history</Text>
                    <Name>disableClipboardHistory__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableActivityFeed__true" IsRequired="true" Description="Windows tracks what files you open and apps you use, then shows this in a &apos;timeline&apos;. This data is also sent to the cloud.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable it</Text>
                    <Name>disableActivityFeed__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep it</Text>
                    <Name>disableActivityFeed__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableLocation__true" IsRequired="true" Description="Windows tracks your location for maps, weather, and Find My Device. On a desktop, this is usually unnecessary.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable location</Text>
                    <Name>disableLocation__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep location available</Text>
                    <Name>disableLocation__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableTailoredExperiences__true" IsRequired="true" Description="Windows uses your activity to show targeted tips, app suggestions, and literal ads in the Start menu. Your OS is an ad platform. Let that sink in.">
            <Options>
                <RadioOption>
                    <Text>Yes — stop personalized suggestions</Text>
                    <Name>disableTailoredExperiences__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep it</Text>
                    <Name>disableTailoredExperiences__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableSpeechPersonalization__true" IsRequired="true" Description="Windows can send your voice and typing patterns to Microsoft to improve their AI. If you don&apos;t use dictation, there&apos;s no reason for this.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable it</Text>
                    <Name>disableSpeechPersonalization__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep it</Text>
                    <Name>disableSpeechPersonalization__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableSmartScreen__true" IsRequired="true" Description="SmartScreen checks files you download against Microsoft&apos;s database. It protects you, but also sends data about everything you download.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable SmartScreen</Text>
                    <Name>disableSmartScreen__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep SmartScreen</Text>
                    <Name>disableSmartScreen__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableFastStartup__true" IsRequired="true" Description="Fast Startup (HiberbootEnabled) hibernates the kernel instead of doing a full shutdown. This means drivers and services don&apos;t reinitialize, causing stale state bugs and dual-boot filesystem issues.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable Fast Startup</Text>
                    <Name>disableFastStartup__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Fast Startup</Text>
                    <Name>disableFastStartup__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableHibernation__true" IsRequired="true" Description="Hibernation saves your session to disk when sleeping. It uses disk space equal to your RAM (8-64GB).">
            <Options>
                <RadioOption>
                    <Text>Yes — disable hibernation</Text>
                    <Name>disableHibernation__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep hibernation</Text>
                    <Name>disableHibernation__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableAudioEnhancements__true" IsRequired="true" Description="Windows applies sound effects (bass boost, loudness equalization) that can distort audio. Turning them off gives you cleaner sound.">
            <Options>
                <RadioOption>
                    <Text>Yes — turn enhancements off</Text>
                    <Name>disableAudioEnhancements__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep enhancements</Text>
                    <Name>disableAudioEnhancements__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="enableAudioExclusiveMode__true" IsRequired="true" Description="This gives one app at a time direct access to your speakers for lower latency. Other apps won&apos;t make sound while it&apos;s active.">
            <Options>
                <RadioOption>
                    <Text>Yes — enable exclusive mode</Text>
                    <Name>enableAudioExclusiveMode__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep shared audio</Text>
                    <Name>enableAudioExclusiveMode__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="restoreClassicContextMenu__true" IsRequired="true" Description="Keeps the stock Windows 11 context menu style but removes a few noisy legacy entries using the safe Shell Extensions Blocked path only.">
            <Options>
                <RadioOption>
                    <Text>Yes — clean up extra entries</Text>
                    <Name>restoreClassicContextMenu__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep every stock entry</Text>
                    <Name>restoreClassicContextMenu__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="enableEndTask__true" IsRequired="true" Description="When an app freezes, you can kill it directly from the taskbar instead of opening Task Manager.">
            <Options>
                <RadioOption>
                    <Text>Yes — add End Task</Text>
                    <Name>enableEndTask__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep default taskbar menu</Text>
                    <Name>enableEndTask__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableBackgroundApps__true" IsRequired="true" Description="Many apps keep running silently even when you&apos;re not using them, eating CPU and memory.">
            <Options>
                <RadioOption>
                    <Text>Yes — stop background apps</Text>
                    <Name>disableBackgroundApps__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep background apps</Text>
                    <Name>disableBackgroundApps__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableAutomaticMaintenance__true" IsRequired="true" Description="Windows runs cleanup and optimization tasks when your PC is idle. This can cause unexpected activity and wake-ups.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable it</Text>
                    <Name>disableAutomaticMaintenance__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep it</Text>
                    <Name>disableAutomaticMaintenance__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="enableGameMode__true" IsRequired="true" Description="Game Mode tells Windows to prioritize games over background tasks. A small but real improvement.">
            <Options>
                <RadioOption>
                    <Text>Yes — enable Game Mode</Text>
                    <Name>enableGameMode__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep default</Text>
                    <Name>enableGameMode__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableTransparency__true" IsRequired="true" Description="The see-through blur effects on windows and taskbar use GPU resources. Turning them off makes the desktop feel snappier.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable transparency</Text>
                    <Name>disableTransparency__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep transparency</Text>
                    <Name>disableTransparency__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="aggressiveBoostMode__true" IsRequired="true" Description="Keeps your CPU running at higher speeds under load instead of backing off to save power.">
            <Options>
                <RadioOption>
                    <Text>Yes — use aggressive boost</Text>
                    <Name>aggressiveBoostMode__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep default boost</Text>
                    <Name>aggressiveBoostMode__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="minProcessorState100__true" IsRequired="true" Description="Prevents your CPU from slowing down between tasks. Reduces the tiny delays when the CPU needs to speed up again.">
            <Options>
                <RadioOption>
                    <Text>Yes — keep at full speed</Text>
                    <Name>minProcessorState100__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — allow speed scaling</Text>
                    <Name>minProcessorState100__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableCoreParking__true" IsRequired="true" Description="Windows parks idle CPU cores (C6 state). Unparking takes 1-5ms which causes micro-stutters in games. Sets MinProcessorState to 100% and disables core parking via powercfg.">
            <Options>
                <RadioOption>
                    <Text>Yes — keep all cores active</Text>
                    <Name>disableCoreParking__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — allow core sleeping</Text>
                    <Name>disableCoreParking__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="gamingMmcss__true" IsRequired="true" Description="Adjusts how Windows schedules game and media threads to give them higher priority.">
            <Options>
                <RadioOption>
                    <Text>Yes — optimize for games</Text>
                    <Name>gamingMmcss__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep defaults</Text>
                    <Name>gamingMmcss__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableMemoryCompression__true" IsRequired="true" Description="Disables memory compression (Disable-MMAgent -MemoryCompression), fixes the known NDU driver memory leak (ndu.sys Start=4), and disables SysMain/Superfetch service.">
            <Options>
                <RadioOption>
                    <Text>Yes — optimize memory</Text>
                    <Name>disableMemoryCompression__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep defaults</Text>
                    <Name>disableMemoryCompression__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableHags__true" IsRequired="true" Description="HAGS (HwSchMode) offloads GPU memory scheduling to the GPU firmware. It reduces CPU overhead but can increase frame time variance and cause micro-stutters on some hardware.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable HAGS</Text>
                    <Name>disableHags__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep HAGS enabled</Text>
                    <Name>disableHags__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableGpuTelemetry__true" IsRequired="true" Description="NVIDIA and AMD drivers run background services that collect usage data. Disabling them doesn&apos;t affect your graphics.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable GPU telemetry</Text>
                    <Name>disableGpuTelemetry__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep GPU telemetry</Text>
                    <Name>disableGpuTelemetry__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableGameDvr__true" IsRequired="true" Description="Game DVR (GameBarPresenceWriter + AppCaptureEnabled) silently records gameplay. It hooks into the GPU pipeline and causes measurable frame time spikes, especially on mid-range GPUs.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable Game DVR</Text>
                    <Name>disableGameDvr__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Game DVR</Text>
                    <Name>disableGameDvr__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableFullscreenOptimizations__true" IsRequired="true" Description="Windows adds a compatibility layer to fullscreen apps. Disabling it gives you true fullscreen with lower input lag.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable them</Text>
                    <Name>disableFullscreenOptimizations__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep them enabled</Text>
                    <Name>disableFullscreenOptimizations__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableDynamicTick__true" IsRequired="true" Description="Windows adjusts its internal timer dynamically. Fixing it gives more consistent timing, but uses slightly more power.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable dynamic tick</Text>
                    <Name>disableDynamicTick__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep dynamic tick</Text>
                    <Name>disableDynamicTick__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="removeEdge__true" IsRequired="true" Description="This permanently deletes Edge from your system. This cannot be undone from within Windows.">
            <Options>
                <RadioOption>
                    <Text>Yes — remove Edge</Text>
                    <Name>removeEdge__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Edge installed</Text>
                    <Name>removeEdge__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="preserveWebView2__true" IsRequired="true" Description="WebView2 is a hidden component that many apps (Teams, Widgets, Electron apps) need to work. Removing it WILL break these apps.">
            <Options>
                <RadioOption>
                    <Text>Yes — keep WebView2</Text>
                    <Name>preserveWebView2__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — remove WebView2</Text>
                    <Name>preserveWebView2__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="reduceMitigations__true" IsRequired="true" Description="Disabling Spectre mitigations can give 5-10% more performance, but removes important security protections.">
            <Options>
                <RadioOption>
                    <Text>Yes — reduce protections</Text>
                    <Name>reduceMitigations__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep protections</Text>
                    <Name>reduceMitigations__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableHvci__true" IsRequired="true" Description="HVCI is a security feature that verifies code running in the Windows kernel. Disabling it may improve performance but weakens security.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable HVCI</Text>
                    <Name>disableHvci__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep HVCI enabled</Text>
                    <Name>disableHvci__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableDefender__true" IsRequired="true" Description="This removes ALL antivirus protection. Your PC will have zero malware scanning. This is the most aggressive option in the entire wizard.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable Defender entirely</Text>
                    <Name>disableDefender__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Defender active</Text>
                    <Name>disableDefender__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableWindowsUpdate__true" IsRequired="true" Description="Disables Windows Update completely. You will NOT receive security patches, bug fixes, or driver updates unless you manually re-enable it.">
            <Options>
                <RadioOption>
                    <Text>Yes — stop all updates</Text>
                    <Name>disableWindowsUpdate__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep updates</Text>
                    <Name>disableWindowsUpdate__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableLlmnr__true" IsRequired="true" Description="Removes old, vulnerable network protocols (LLMNR, SMBv1, WPAD) that are commonly exploited in attacks.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable legacy protocols</Text>
                    <Name>disableLlmnr__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep legacy protocols</Text>
                    <Name>disableLlmnr__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableTeredo__true" IsRequired="true" Description="Teredo is an old workaround for IPv6 compatibility. Almost nothing uses it anymore.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable Teredo</Text>
                    <Name>disableTeredo__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Teredo</Text>
                    <Name>disableTeredo__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableNetbios__true" IsRequired="true" Description="NetBIOS is an old way for computers to find each other on a network. Modern networks don&apos;t need it, but very old printers or NAS devices might.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable NetBIOS</Text>
                    <Name>disableNetbios__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep NetBIOS</Text>
                    <Name>disableNetbios__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableNagle__true" IsRequired="true" Description="Nagle&apos;s algorithm batches small TCP packets to reduce overhead, but adds 40-200ms delay per send. Disabling it (TcpAckFrequency=1, TCPNoDelay=1) sends each packet immediately. Important for competitive gaming and VoIP.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable packet batching</Text>
                    <Name>disableNagle__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep packet buffering</Text>
                    <Name>disableNagle__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableNicOffloading__true" IsRequired="true" Description="Lets your CPU handle network processing directly instead of your network card. Faster for gaming, but uses slightly more CPU.">
            <Options>
                <RadioOption>
                    <Text>Yes — low-latency mode</Text>
                    <Name>disableNicOffloading__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep default settings</Text>
                    <Name>disableNicOffloading__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableDeliveryOptimization__true" IsRequired="true" Description="Windows uploads parts of updates to other computers, using your internet bandwidth in the background.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable it</Text>
                    <Name>disableDeliveryOptimization__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep it</Text>
                    <Name>disableDeliveryOptimization__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableUsbSelectiveSuspend__true" IsRequired="true" Description="Windows puts USB devices to sleep to save power. This can cause your mouse, keyboard, or headset to briefly disconnect.">
            <Options>
                <RadioOption>
                    <Text>Yes — keep USB devices awake</Text>
                    <Name>disableUsbSelectiveSuspend__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep USB power saving</Text>
                    <Name>disableUsbSelectiveSuspend__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disablePcieLinkStatePm__true" IsRequired="true" Description="Your GPU and SSD connect through PCIe. Power saving mode adds tiny delays when they wake up from idle. On desktops, disabling this is safe.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable PCIe power saving</Text>
                    <Name>disablePcieLinkStatePm__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep PCIe power saving</Text>
                    <Name>disablePcieLinkStatePm__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableMouseAcceleration__true" IsRequired="true" Description="Windows applies pointer acceleration (EnhancedPointerPrecision) that scales mouse movement non-linearly. Competitive gamers need 1:1 input where physical distance = cursor distance, regardless of speed.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable acceleration</Text>
                    <Name>disableMouseAcceleration__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep acceleration</Text>
                    <Name>disableMouseAcceleration__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableStickyKeys__true" IsRequired="true" Description="Pressing Shift 5 times triggers a Sticky Keys popup. Filter Keys and Toggle Keys have similar shortcuts. Every gamer has been interrupted by this at least once during the worst possible moment.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable accessibility shortcuts</Text>
                    <Name>disableStickyKeys__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep accessibility shortcuts</Text>
                    <Name>disableStickyKeys__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableFaultTolerantHeap__true" IsRequired="true" Description="FTH monitors crashing apps and silently applies heap mitigations (extra padding, delayed frees) to &quot;fix&quot; them. This adds memory overhead and hides real bugs instead of fixing them. Gamers don&apos;t need Windows babysitting their heap.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable FTH</Text>
                    <Name>disableFaultTolerantHeap__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep FTH enabled</Text>
                    <Name>disableFaultTolerantHeap__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableMPOs__true" IsRequired="true" Description="MPOs (iFlip) let the GPU compositor use hardware overlay planes for rendering. On some GPU/monitor combos, this causes frame pacing issues, black screen flickers, and inconsistent frame times. Disabling forces classic single-plane composition.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable MPOs</Text>
                    <Name>disableMPOs__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep MPOs enabled</Text>
                    <Name>disableMPOs__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableLastAccessTime__true" IsRequired="true" Description="NTFS updates the last access time on every file read. That&apos;s a write operation for every read — an absurd default. Disabling it reduces disk writes noticeably on HDDs and marginally on SSDs.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable last access timestamps</Text>
                    <Name>disableLastAccessTime__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep timestamps</Text>
                    <Name>disableLastAccessTime__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableDevicePowerSaving__true" IsRequired="true" Description="Windows puts USB controllers, network adapters, and PCI devices into low-power states when idle. This adds wake latency (1-10ms) that causes input lag, network hiccups, and audio dropouts on desktops.">
            <Options>
                <RadioOption>
                    <Text>Yes — keep all devices fully powered</Text>
                    <Name>disableDevicePowerSaving__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep device power saving</Text>
                    <Name>disableDevicePowerSaving__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="legacyFlipPresentation__true" IsRequired="true" Description="Modern Windows uses composed flip (DWM adds a frame of latency). Legacy Flip bypasses DWM entirely for the lowest possible input-to-display latency. This is what competitive gamers use.">
            <Options>
                <RadioOption>
                    <Text>Yes — force Legacy Flip</Text>
                    <Name>legacyFlipPresentation__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep composed flip</Text>
                    <Name>legacyFlipPresentation__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableStoreAutoUpdates__true" IsRequired="true" Description="Microsoft Store downloads and installs app updates in the background without asking. This consumes bandwidth, CPU, and can happen during gaming sessions.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable auto-updates</Text>
                    <Name>disableStoreAutoUpdates__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep auto-updates</Text>
                    <Name>disableStoreAutoUpdates__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableAutoMaintenance__true" IsRequired="true" Description="Windows runs defrag, security scans, and cleanup tasks on a schedule. These tasks can cause sudden CPU/disk spikes during gaming or work, and wake your PC from sleep.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable auto maintenance</Text>
                    <Name>disableAutoMaintenance__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep auto maintenance</Text>
                    <Name>disableAutoMaintenance__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="fullDefenderDisable__true" IsRequired="true" Description="The nuclear option. Disables WinDefend, WdFilter, WdBoot, WdNisSvc, SecurityHealthService, wscsvc, Sense, MsSecCore — all 9 Defender services plus SmartScreen, WTDS, and cloud protection. Zero antivirus. Zero overhead. You must disable Tamper Protection in Windows Security settings first.">
            <Options>
                <RadioOption>
                    <Text>Yes — kill Defender completely</Text>
                    <Name>fullDefenderDisable__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep Defender running</Text>
                    <Name>fullDefenderDisable__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableVulnerableDriverBlocklist__true" IsRequired="true" Description="Microsoft blocks drivers with known vulnerabilities from loading. Disabling this allows kernel tools like RW-Everything (used for XHCI IMOD tuning) and older hardware drivers that Microsoft has blacklisted.">
            <Options>
                <RadioOption>
                    <Text>Yes — allow all drivers</Text>
                    <Name>disableVulnerableDriverBlocklist__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep the blocklist</Text>
                    <Name>disableVulnerableDriverBlocklist__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disableCpuMitigations__true" IsRequired="true" Description="Modern CPUs have hardware mitigations for Spectre V1/V2/V4, Meltdown, MDS, and L1TF. These add 2-15% performance overhead on syscall-heavy workloads. Disabling them renames the microcode update DLL (requires TrustedInstaller) and sets FeatureSettingsOverride=3.">
            <Options>
                <RadioOption>
                    <Text>Yes — disable CPU mitigations</Text>
                    <Name>disableCpuMitigations__true</Name>
                </RadioOption>
                <RadioOption>
                    <Text>No — keep mitigations active</Text>
                    <Name>disableCpuMitigations__false</Name>
                </RadioOption>
            </Options>
        </RadioPage>
    </FeaturePages>
</Playbook>
