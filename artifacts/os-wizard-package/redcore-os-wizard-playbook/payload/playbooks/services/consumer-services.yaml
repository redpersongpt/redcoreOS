# ─── Services: Consumer Services ──────────────────────────────────────────────
# Disables Print Spooler, Remote Access, and Xbox services.

module: services.consumer-services
name: "Consumer Service Reduction"
description: "Disable Print Spooler, Remote Access, and Xbox services to reduce attack surface and resource usage"
category: services

actions:
  - id: services.disable-print-spooler
    name: "Disable Print Spooler"
    description: "Disable the Print Spooler service which manages print queues. Safe to disable on gaming systems with no printers."
    rationale: "The Print Spooler loads multiple DLLs and has been the target of multiple critical security vulnerabilities (PrintNightmare CVE-2021-34527)."
    risk: low
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles:
      - work_pc
    serviceChanges:
      - name: Spooler
        startupType: Disabled

  - id: services.disable-remote-services
    name: "Disable Remote Access Services"
    description: "Disable Remote Desktop, Remote Registry, and Remote Assistance services that allow external connections to this PC"
    rationale: "Remote access services listen for incoming connections and maintain authentication state. On a dedicated gaming PC, these represent unnecessary attack surface."
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 3
    blockedProfiles:
      - work_pc
    registryChanges:
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control\\Remote Assistance"
        valueName: fAllowToGetHelp
        value: 0
        valueType: DWord
    serviceChanges:
      - name: RemoteRegistry
        startupType: Disabled
      - name: TermService
        startupType: Disabled
      - name: SessionEnv
        startupType: Disabled

  - id: services.disable-xbox-services
    name: "Disable Xbox Background Services"
    description: "Disable Xbox Live Auth Manager, Xbox Live Game Save, and Xbox Accessory Management services"
    rationale: "Xbox services run in the background even without Xbox hardware or Game Pass. They consume resources and maintain network connections to Xbox Live."
    risk: low
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 3
    blockedProfiles:
      - vm_cautious
    serviceChanges:
      - name: XblAuthManager
        startupType: Disabled
      - name: XblGameSave
        startupType: Disabled
      - name: XboxNetApiSvc
        startupType: Disabled
      - name: XboxGipSvc
        startupType: Disabled
