# Shell: Taskbar Cleanup
module: shell.taskbar
name: "Taskbar Cleanup"
description: "Remove clutter from the Windows taskbar"
category: shell

actions:
  - id: shell.hide-task-view
    name: "Hide Task View Button"
    description: "Remove the Task View button from the taskbar"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        valueName: ShowTaskViewButton
        value: 0
        valueType: DWord

  - id: shell.hide-widgets-button
    name: "Hide Widgets Button"
    description: "Remove the Widgets button from the taskbar"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        valueName: TaskbarDa
        value: 0
        valueType: DWord

  - id: shell.reduce-search-box
    name: "Reduce Search Box"
    description: "Reduce the taskbar search box to an icon"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: [work_pc]
    registryChanges:
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Search"
        valueName: SearchboxTaskbarMode
        value: 1
        valueType: DWord

  - id: shell.disable-copilot
    name: "Disable Windows Copilot"
    description: "Disable the Copilot AI sidebar and remove the taskbar button"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKCU
        path: "Software\\Policies\\Microsoft\\Windows\\WindowsCopilot"
        valueName: TurnOffWindowsCopilot
        value: 1
        valueType: DWord
      - hive: HKLM
        path: "SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsCopilot"
        valueName: TurnOffWindowsCopilot
        value: 1
        valueType: DWord
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        valueName: ShowCopilotButton
        value: 0
        valueType: DWord

  - id: shell.hide-chat-icon
    name: "Hide Teams Chat Icon"
    description: "Remove the Teams Chat icon from the taskbar"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        valueName: TaskbarMn
        value: 0
        valueType: DWord

  - id: shell.enable-end-task
    name: "Enable End Task in Taskbar"
    description: "Show End Task option when right-clicking apps on the taskbar"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    minWindowsBuild: 22631
    registryChanges:
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced\\TaskbarDeveloperSettings"
        valueName: TaskbarEndTask
        value: 1
        valueType: DWord

  - id: shell.disable-meet-now
    name: "Hide Meet Now"
    description: "Hide the Meet Now / Chat icon from the system tray"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKCU
        path: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer"
        valueName: HideSCAMeetNow
        value: 1
        valueType: DWord
