# Shell: Context Menu Cleanup
# WARNING: Shell extension modifications can crash Explorer on some Windows builds.
# Only safe operations (Shell Extensions\Blocked registry) are default-enabled.
# ContextMenuHandlers and InprocServer32 modifications are expert-only.

module: shell.context-menu
name: "Context Menu Cleanup"
description: "Remove unnecessary context menu entries using safe blocking methods"
category: shell

actions:
  - id: shell.restore-classic-context-menu
    name: "Restore Classic Context Menu (Win11)"
    description: "Restore the full classic right-click context menu on Windows 11. WARNING: This modifies a shell CLSID InprocServer32 key. On some Windows builds, this can cause Explorer to crash repeatedly. Only use if you know how to revert via registry."
    rationale: "Windows 11 hides most context menu entries behind 'Show more options'. This restores the classic menu but carries risk of Explorer instability."
    risk: high
    tier: free
    default: false
    expertOnly: true
    requiresReboot: true
    reversible: true
    estimatedSeconds: 2
    minWindowsBuild: 22000
    blockedProfiles:
      - work_pc
      - office_laptop
    warningMessage: "This can crash File Explorer on some Windows builds. If Explorer stops responding after reboot, open CMD as admin and run: reg delete \"HKCU\\Software\\Classes\\CLSID\\{86ca1aa0-34aa-4e8b-a509-50c905bae2a8}\" /f"
    registryChanges:
      - hive: HKCU
        path: "Software\\Classes\\CLSID\\{86ca1aa0-34aa-4e8b-a509-50c905bae2a8}\\InprocServer32"
        valueName: ""
        value: ""
        valueType: String

  - id: shell.remove-cast-to-device
    name: "Remove 'Cast to Device' from Context Menu"
    description: "Remove the 'Cast to Device' / 'Play To' media streaming entry from right-click menu"
    rationale: "Uses the safe Shell Extensions\\Blocked method — does not modify shell handlers directly."
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKLM
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Shell Extensions\\Blocked"
        valueName: "{7AD84985-87B4-4a16-BE58-8B72A5B390F7}"
        value: "Play To menu"
        valueType: String

  - id: shell.remove-troubleshoot-compatibility
    name: "Remove 'Troubleshoot compatibility' from Context Menu"
    description: "Remove the compatibility troubleshooter from .exe right-click menu"
    rationale: "Uses the safe Shell Extensions\\Blocked method."
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles:
      - work_pc
    registryChanges:
      - hive: HKLM
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Shell Extensions\\Blocked"
        valueName: "{1d27f844-3a1f-4410-85ac-14651078412d}"
        value: "Compatibility troubleshooter"
        valueType: String

  - id: shell.remove-edit-with-paint3d
    name: "Remove 'Edit with Paint 3D' from Context Menu"
    description: "Hide the deprecated Paint 3D context menu entry for image files"
    rationale: "Uses ProgrammaticAccessOnly — safe, does not remove any shell extensions."
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKLM
        path: "SOFTWARE\\Classes\\SystemFileAssociations\\.bmp\\Shell\\3D Edit"
        valueName: "ProgrammaticAccessOnly"
        value: ""
        valueType: String
      - hive: HKLM
        path: "SOFTWARE\\Classes\\SystemFileAssociations\\.jpg\\Shell\\3D Edit"
        valueName: "ProgrammaticAccessOnly"
        value: ""
        valueType: String
      - hive: HKLM
        path: "SOFTWARE\\Classes\\SystemFileAssociations\\.png\\Shell\\3D Edit"
        valueName: "ProgrammaticAccessOnly"
        value: ""
        valueType: String

  # REMOVED: shell.remove-share-context — modifying ContextMenuHandlers\ModernSharing
  # can crash Explorer on some Windows builds. Not worth the risk for removing one menu entry.

  # REMOVED: shell.remove-give-access-to — modifying ContextMenuHandlers\Sharing
  # can crash Explorer. Network sharing handler is critical on some systems.

  # REMOVED: shell.remove-include-in-library — modifying ContextMenuHandlers\Library Location
  # can destabilize Explorer shell extension loading.
