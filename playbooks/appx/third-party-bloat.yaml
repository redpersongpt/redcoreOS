# AppX: Third-Party Preinstalled Bloatware

module: appx.third-party-bloat
name: "Third-Party Bloatware Removal"
description: "Remove OEM-preinstalled third-party apps: social media, games, trials, adware"
category: appx

actions:
  - id: appx.remove-social-media
    name: "Remove Social Media Apps"
    description: "Remove preinstalled Facebook, Instagram, TikTok, Twitter, LinkedIn, Flipboard"
    rationale: "OEMs preinstall social media apps that consume storage and run background tasks"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: false
    estimatedSeconds: 15
    blockedProfiles:
      - vm_cautious
    packages:
      - Facebook
      - Instagram
      - BytedancePte.Ltd.TikTok
      - Twitter
      - LinkedIn
      - Flipboard

  - id: appx.remove-streaming-trials
    name: "Remove Streaming App Trials"
    description: "Remove preinstalled Spotify, Hulu, Disney+, Amazon Prime Video, Netflix, iHeartRadio"
    rationale: "Trial/ad versions of streaming apps that users can install themselves if wanted"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: false
    estimatedSeconds: 15
    blockedProfiles:
      - vm_cautious
    packages:
      - SpotifyAB.SpotifyMusic
      - HULLLC.HULUPLUS
      - Disney
      - AmazonVideo.PrimeVideo
      - Netflix
      - iHeartRadio

  - id: appx.remove-casual-games
    name: "Remove Preinstalled Games"
    description: "Remove King games (Candy Crush, Farm Heroes, Bubble Witch), Disney Magic Kingdoms, Asphalt, Hidden City, FarmVille, Caesars Slots"
    rationale: "Ad-supported freemium games preinstalled by OEMs. Consume storage and show notifications."
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: false
    estimatedSeconds: 20
    blockedProfiles:
      - vm_cautious
    packages:
      - king.com.CandyCrushSaga
      - king.com.CandyCrushSodaSaga
      - king.com.CandyCrushFriends
      - king.com.BubbleWitch3Saga
      - king.com.FarmHeroesSaga
      - DisneyMagicKingdoms
      - Asphalt8Airborne
      - HiddenCity
      - FarmVille2CountryEscape
      - CaesarsSlotsFreeCasino

  - id: appx.remove-oem-utilities
    name: "Remove OEM Utility Bloat"
    description: "Remove preinstalled third-party utilities: Adobe Express, Duolingo, Fitbit, Drawboard PDF, CyberLink, Autodesk SketchBook"
    rationale: "Trial/limited editions of apps that most users don't need"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: false
    estimatedSeconds: 15
    blockedProfiles:
      - vm_cautious
    packages:
      - AdobeSystemsIncorporated.AdobePhotoshopExpress
      - Duolingo-LearnLanguagesforFree
      - fitbit
      - DrawboardPDF
      - CyberLinkMediaSuiteEssentials
      - AutodeskSketchBook
      - ACGMediaPlayer
      - ActiproSoftwareLLC
      - EclipseManager

  - id: appx.remove-shopping-amazon
    name: "Remove Amazon & Shopping Apps"
    description: "Remove preinstalled Amazon app and shopping-related bloatware"
    rationale: "OEM deal apps that are essentially advertisements"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: false
    estimatedSeconds: 8
    blockedProfiles:
      - vm_cautious
    packages:
      - Amazon.com.Amazon
      - AmazonVideo.PrimeVideo

  - id: appx.remove-ms-extended-bloat
    name: "Remove Extended Microsoft Bloat"
    description: "Remove additional Microsoft apps: Clipchamp, Journal, PC Manager, Teams (old+new), DevHome, Quick Assist, News, OneNote, Sway, OneConnect, 3DBuilder, NetworkSpeedTest, PowerBI, ZuneVideo, Family Safety"
    rationale: "These Microsoft apps are rarely used by most consumers and run background services"
    risk: low
    tier: free
    default: true
    requiresReboot: false
    reversible: false
    estimatedSeconds: 25
    blockedProfiles:
      - vm_cautious
    packages:
      - Clipchamp.Clipchamp
      - Microsoft.MicrosoftJournal
      - Microsoft.PCManager
      - MicrosoftTeams
      - MSTeams
      - Microsoft.Windows.DevHome
      - MicrosoftCorporationII.QuickAssist
      - Microsoft.News
      - Microsoft.Office.OneNote
      - Microsoft.Office.Sway
      - Microsoft.OneConnect
      - Microsoft.3DBuilder
      - Microsoft.NetworkSpeedTest
      - Microsoft.MicrosoftPowerBIForWindows
      - Microsoft.ZuneVideo
      - MicrosoftCorporationII.MicrosoftFamily
      - Microsoft.Print3D
      - Microsoft.Microsoft3DViewer
      - Microsoft.Messaging
      - Microsoft.BingFinance
      - Microsoft.BingSports
      - Microsoft.BingTranslator
      - Microsoft.BingFoodAndDrink
      - Microsoft.BingHealthAndFitness
      - Microsoft.BingTravel

  - id: appx.remove-copilot-app
    name: "Remove Copilot App"
    description: "Remove the Microsoft Copilot AppX package and AI Hub"
    rationale: "Copilot is already disabled via registry policy. This removes the residual app package."
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: false
    estimatedSeconds: 8
    blockedProfiles: []
    packages:
      - Microsoft.Copilot
      - Microsoft.Windows.Ai.Copilot.Provider
      - Microsoft.Windows.AIHub
