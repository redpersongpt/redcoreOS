# Security: Mitigation Control

module: security.mitigations
name: "Security Mitigation Control"
description: "Reduce CPU security mitigations and hypervisor code integrity for maximum performance (expert-only)"
category: security

actions:
  - id: security.reduce-ssbd-mitigation
    name: "Reduce Speculative Store Bypass (SSBD) Mitigation"
    description: "Disable the SSBD mitigation via FeatureSettingsOverride registry keys. This reduces a 2-8% performance overhead on syscall-heavy workloads but exposes the system to CVE-2018-3639."
    rationale: "SSBD mitigates Spectre Variant 4. On dedicated gaming PCs not used for sensitive operations, the 2-8% overhead may not justify the protection."
    risk: high
    tier: premium
    default: false
    expertOnly: true
    requiresReboot: true
    reversible: true
    estimatedSeconds: 3
    blockedProfiles:
      - work_pc
      - office_laptop
      - vm_cautious
    registryChanges:
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
        valueName: FeatureSettingsOverride
        value: 8
        valueType: DWord
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
        valueName: FeatureSettingsOverrideMask
        value: 3
        valueType: DWord

  - id: security.disable-hvci
    name: "Disable Hypervisor-enforced Code Integrity"
    description: "Disable HVCI (Hypervisor-enforced Code Integrity) which validates kernel-mode code integrity using the hypervisor, adding overhead to every driver load and some system calls"
    rationale: "HVCI adds hypervisor-level validation overhead to kernel operations. On dedicated gaming PCs, disabling it reduces DPC latency and improves driver performance at the cost of reduced kernel security."
    risk: high
    tier: free
    default: false
    expertOnly: true
    requiresReboot: true
    reversible: true
    estimatedSeconds: 3
    blockedProfiles:
      - work_pc
      - office_laptop
      - vm_cautious
    registryChanges:
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\HypervisorEnforcedCodeIntegrity"
        valueName: Enabled
        value: 0
        valueType: DWord

  - id: security.disable-cpu-mitigations
    name: "Disable CPU Microcode Mitigations (Spectre/Meltdown)"
    description: "Disable Spectre/Meltdown CPU mitigations by renaming the microcode update DLLs. Affects mcupdate_GenuineIntel.dll (Intel) or mcupdate_AuthenticAMD.dll (AMD). Requires TrustedInstaller privileges."
    rationale: "CPU security mitigations (Spectre V1/V2/V4, Meltdown, MDS, L1TF) add 2-15% performance overhead on syscall-heavy and memory-intensive workloads. PC-Tuning benchmarks show measurable improvements in frame times and min FPS when mitigations are disabled. THIS IS A SECURITY RISK — only for isolated gaming/benchmark systems."
    risk: extreme
    tier: premium
    default: false
    expertOnly: true
    requiresReboot: true
    reversible: true
    estimatedSeconds: 10
    blockedProfiles:
      - work_pc
      - office_laptop
      - vm_cautious
      - low_spec_system
    warningMessage: "EXTREME SECURITY RISK. Disabling CPU mitigations exposes your system to Spectre, Meltdown, MDS, and L1TF attacks. Only appropriate for air-gapped dedicated gaming PCs. Requires TrustedInstaller elevation."
    registryChanges:
      # Disable speculative execution mitigations via registry
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
        valueName: FeatureSettingsOverride
        value: 3
        valueType: DWord
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
        valueName: FeatureSettingsOverrideMask
        value: 3
        valueType: DWord
    # Note: The DLL rename (mcupdate_GenuineIntel.dll → .dlll) requires
    # TrustedInstaller privileges via MinSudo and is handled by the executor
    # as a special fileRename operation, not a registry change.
    fileRenames:
      - source: "C:\\Windows\\System32\\mcupdate_GenuineIntel.dll"
        target: "C:\\Windows\\System32\\mcupdate_GenuineIntel.dll.bak"
        requiresTrustedInstaller: true
        cpuVendor: Intel
      - source: "C:\\Windows\\System32\\mcupdate_AuthenticAMD.dll"
        target: "C:\\Windows\\System32\\mcupdate_AuthenticAMD.dll.bak"
        requiresTrustedInstaller: true
        cpuVendor: AMD
