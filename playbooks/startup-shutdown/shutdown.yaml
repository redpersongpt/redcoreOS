# Startup/Shutdown: Shutdown Optimization
module: startup.shutdown
name: "Shutdown Optimization"
description: "Reduce shutdown time and auto-end hung applications"
category: startup

actions:
  - id: shutdown.decrease-shutdown-time
    name: "Decrease Shutdown Time"
    description: "Reduce app kill timeouts for faster shutdown. Does NOT auto-end tasks — Windows will still ask before killing hung apps."
    rationale: "Default 5000ms timeout delays shutdown; 3500ms balances speed with stability"
    risk: low
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKCU
        path: "Control Panel\\Desktop"
        valueName: WaitToKillAppTimeout
        value: "3500"
        valueType: String
      - hive: HKCU
        path: "Control Panel\\Desktop"
        valueName: HungAppTimeout
        value: "3500"
        valueType: String

  - id: shutdown.force-end-apps
    name: "Force End Applications"
    description: "Reduce WaitToKillServiceTimeout for faster service shutdown"
    risk: low
    tier: free
    default: false
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control"
        valueName: WaitToKillServiceTimeout
        value: "2000"
        valueType: String
