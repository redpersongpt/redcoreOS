# Performance: CPU & Scheduler
module: performance.cpu
name: "CPU & Scheduler Tuning"
description: "Optimize CPU scheduling, MMCSS, and thread priority"
category: performance

actions:
  - id: perf.mmcss-system-responsiveness
    name: "Set MMCSS System Responsiveness"
    description: "Allocate more CPU to multimedia/gaming tasks (10% reserved for background)"
    rationale: "Default 20% background reservation is excessive for gaming"
    risk: low
    tier: free
    default: true
    requiresReboot: true
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: [work_pc]
    registryChanges:
      - hive: HKLM
        path: "SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile"
        valueName: SystemResponsiveness
        value: 10
        valueType: DWord

  - id: perf.disable-service-host-split
    name: "Disable Service Host Splitting"
    description: "Group services into fewer svchost processes to reduce memory overhead"
    risk: low
    tier: free
    default: true
    requiresReboot: true
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control"
        valueName: SvcHostSplitThresholdInKB
        value: 4294967295
        valueType: DWord

  - id: perf.disable-paging-executive
    name: "Disable Paging Executive"
    description: "Keep kernel-mode drivers and system code in RAM"
    rationale: "Prevents kernel code from being paged to disk, reducing latency"
    risk: low
    tier: free
    default: true
    requiresReboot: true
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
        valueName: DisablePagingExecutive
        value: 1
        valueType: DWord

  - id: perf.disable-fault-tolerant-heap
    name: "Disable Fault Tolerant Heap"
    description: "Prevent Windows from auto-applying crash mitigations to applications that crash repeatedly"
    rationale: "FTH adds compatibility shims to repeatedly crashing apps. Minimal overhead on stable systems, safe to disable."
    risk: low
    tier: free
    default: true
    expertOnly: false
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKLM
        path: "SOFTWARE\\Microsoft\\FTH"
        valueName: Enabled
        value: 0
        valueType: DWord

  - id: perf.disable-sticky-keys
    name: "Disable Sticky Keys Shortcut"
    description: "Disable the Shift×5 sticky keys shortcut that interrupts gameplay"
    rationale: "Pressing Shift 5 times triggers an accessibility dialog that breaks fullscreen games"
    risk: safe
    tier: free
    default: true
    expertOnly: false
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKCU
        path: "Control Panel\\Accessibility\\StickyKeys"
        valueName: Flags
        value: "506"
        valueType: String

  - id: perf.disable-driver-updates-via-wu
    name: "Exclude Driver Updates from Windows Update"
    description: "Prevent Windows Update from automatically installing driver updates"
    rationale: "Auto-installed drivers can break GPU performance, audio, or peripherals. Manual driver management is safer for tuned systems."
    risk: low
    tier: free
    default: false
    expertOnly: false
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: [work_pc]
    registryChanges:
      - hive: HKLM
        path: "SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate"
        valueName: ExcludeWUDriversInQualityUpdate
        value: 1
        valueType: DWord

  - id: cpu.win32-priority-separation
    name: "Optimize Thread Priority"
    description: "Set Win32PrioritySeparation for foreground-biased scheduling"
    rationale: "Prioritizes foreground applications for better responsiveness"
    risk: low
    tier: free
    default: true
    expertOnly: false
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKLM
        path: "SYSTEM\\CurrentControlSet\\Control\\PriorityControl"
        valueName: Win32PrioritySeparation
        value: 38
        valueType: DWord

  - id: perf.disable-auto-maintenance
    name: "Disable Automatic Maintenance"
    description: "Disable Windows Automatic Maintenance scheduler"
    rationale: "Maintenance tasks (defrag, scan, updates) run at unexpected times and consume CPU/disk. On manually maintained systems this is unnecessary overhead."
    risk: moderate
    tier: free
    default: false
    expertOnly: false
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles:
      - work_pc
    registryChanges:
      - hive: HKLM
        path: "SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Schedule\\Maintenance"
        valueName: MaintenanceDisabled
        value: 1
        valueType: DWord

  - id: perf.disable-auto-sign-on
    name: "Disable Auto-Restart Sign-On"
    description: "Prevent Windows from auto-signing in after restart"
    rationale: "Prevents unexpected auto-login behavior after updates or restarts. Security improvement."
    risk: safe
    tier: free
    default: true
    expertOnly: false
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKLM
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
        valueName: DisableAutomaticRestartSignOn
        value: 1
        valueType: DWord

  - id: perf.disable-store-auto-updates
    name: "Disable Store Auto-Updates"
    description: "Prevent Microsoft Store from automatically downloading app updates"
    rationale: "Background app updates consume bandwidth and CPU at random times. Manual updates provide better control."
    risk: moderate
    tier: free
    default: false
    expertOnly: false
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles:
      - work_pc
    registryChanges:
      - hive: HKLM
        path: "SOFTWARE\\Policies\\Microsoft\\WindowsStore"
        valueName: AutoDownload
        value: 2
        valueType: DWord
