# Personalization: System Theme
# Applied automatically during the personalization step.

module: personalization.theme
name: "System Theme"
description: "Set desktop system colors to match the Ouden dark theme"
category: personalization

actions:
  - id: personalize.dark-mode
    name: "Enable System Dark Mode"
    description: "Set Windows system theme and app theme to dark mode"
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
        valueName: SystemUsesLightTheme
        value: 0
        valueType: DWord
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
        valueName: AppsUseLightTheme
        value: 0
        valueType: DWord

  - id: personalize.accent-color-black
    name: "Set Accent Color to Black"
    description: "Set the Windows accent color to pure black (#000000) so Ctrl+Alt+Del screen, shutdown screen, and login screen use black instead of a colored theme"
    rationale: "Windows uses the accent color for the lock screen, Ctrl+Alt+Del screen, and shutdown overlay. Setting it to black matches the Ouden monochrome theme and prevents jarring color flashes."
    risk: safe
    tier: free
    default: true
    requiresReboot: true
    reversible: true
    estimatedSeconds: 2
    blockedProfiles: []
    registryChanges:
      # Accent color = black (0x00000000 in ABGR format)
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Accent"
        valueName: AccentColorMenu
        value: 0
        valueType: DWord
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Accent"
        valueName: StartColorMenu
        value: 0
        valueType: DWord
      # Show accent color on title bars and window borders = off
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\DWM"
        valueName: ColorPrevalence
        value: 0
        valueType: DWord
      # Show accent color on Start and taskbar = off (keeps it black)
      - hive: HKCU
        path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
        valueName: ColorPrevalence
        value: 0
        valueType: DWord

  - id: personalize.max-refresh-rate
    name: "Set Monitor to Maximum Refresh Rate"
    description: "Detect connected monitor's maximum supported refresh rate and set it. Many users have 144Hz/165Hz/240Hz monitors running at 60Hz without knowing."
    rationale: "Windows sometimes defaults to 60Hz even on high-refresh-rate monitors. This ensures you get the full refresh rate your hardware supports."
    risk: safe
    tier: free
    default: true
    requiresReboot: false
    reversible: true
    estimatedSeconds: 3
    blockedProfiles: []
    powerShellCommands:
      - |
        try {
          Add-Type @"
        using System;
        using System.Runtime.InteropServices;
        [StructLayout(LayoutKind.Sequential, CharSet = CharSet.Ansi)]
        public struct DEVMODE {
            [MarshalAs(UnmanagedType.ByValTStr, SizeConst = 32)] public string dmDeviceName;
            public short dmSpecVersion; public short dmDriverVersion; public short dmSize;
            public short dmDriverExtra; public int dmFields;
            public int dmPositionX; public int dmPositionY;
            public int dmDisplayOrientation; public int dmDisplayFixedOutput;
            public short dmColor; public short dmDuplex; public short dmYResolution;
            public short dmTTOption; public short dmCollate;
            [MarshalAs(UnmanagedType.ByValTStr, SizeConst = 32)] public string dmFormName;
            public short dmLogPixels; public int dmBitsPerPel;
            public int dmPelsWidth; public int dmPelsHeight;
            public int dmDisplayFlags; public int dmDisplayFrequency;
            public int dmICMMethod; public int dmICMIntent; public int dmMediaType;
            public int dmDitherType; public int dmReserved1; public int dmReserved2;
            public int dmPanningWidth; public int dmPanningHeight;
        }
        public class DisplayHelper {
            [DllImport("user32.dll")] public static extern int EnumDisplaySettings(string dev, int mode, ref DEVMODE dm);
            [DllImport("user32.dll")] public static extern int ChangeDisplaySettings(ref DEVMODE dm, int flags);
        }
        "@ -ErrorAction SilentlyContinue

          # Find the max Hz supported at current resolution
          $dm = New-Object DEVMODE
          $dm.dmSize = [System.Runtime.InteropServices.Marshal]::SizeOf($dm)
          $maxHz = 0; $bestMode = $null; $idx = 0
          # Get current resolution
          [DisplayHelper]::EnumDisplaySettings($null, -1, [ref]$dm) | Out-Null
          $curW = $dm.dmPelsWidth; $curH = $dm.dmPelsHeight; $curHz = $dm.dmDisplayFrequency

          while ([DisplayHelper]::EnumDisplaySettings($null, $idx, [ref]$dm) -ne 0) {
            if ($dm.dmPelsWidth -eq $curW -and $dm.dmPelsHeight -eq $curH -and $dm.dmDisplayFrequency -gt $maxHz) {
              $maxHz = $dm.dmDisplayFrequency
              $bestMode = $dm.PSObject.Copy()
            }
            $idx++
            $dm = New-Object DEVMODE
            $dm.dmSize = [System.Runtime.InteropServices.Marshal]::SizeOf($dm)
          }

          if ($maxHz -gt $curHz -and $maxHz -gt 60) {
            # Apply the best mode
            $apply = New-Object DEVMODE
            $apply.dmSize = [System.Runtime.InteropServices.Marshal]::SizeOf($apply)
            [DisplayHelper]::EnumDisplaySettings($null, -1, [ref]$apply) | Out-Null
            $apply.dmDisplayFrequency = $maxHz
            $apply.dmFields = 0x400000  # DM_DISPLAYFREQUENCY
            $ret = [DisplayHelper]::ChangeDisplaySettings([ref]$apply, 0)
            if ($ret -eq 0) {
              Write-Host "Refresh rate changed: ${curHz}Hz -> ${maxHz}Hz"
            } else {
              Write-Host "ChangeDisplaySettings returned $ret — refresh rate unchanged"
            }
          } else {
            Write-Host "Already at optimal refresh rate: ${curHz}Hz"
          }
        } catch {
          Write-Host "Could not set refresh rate: $_"
        }
