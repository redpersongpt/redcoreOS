name: Validate Tauri Migration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/os-desktop/src-tauri/**'
      - 'apps/os-desktop/src/renderer/lib/platform*.ts'
      - 'scripts/validate-tauri-bridge.mjs'
      - '.github/workflows/validate-tauri-migration.yml'

concurrency:
  group: tauri-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1

jobs:
  validate-tauri-windows:
    name: Tauri Windows Validation
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust (Tauri shell)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/os-desktop/src-tauri/target
          key: tauri-windows-${{ hashFiles('apps/os-desktop/src-tauri/Cargo.toml') }}
          restore-keys: tauri-windows-

      - name: Cache Rust (OS service)
        uses: actions/cache@v4
        with:
          path: services/os-service/target
          key: rust-os-service-debug-${{ hashFiles('services/os-service/Cargo.toml') }}
          restore-keys: rust-os-service-debug-

      # ── Phase B: Tauri shell compiles ───────────────────────────────────
      - name: "Phase B: cargo check (Tauri shell)"
        working-directory: apps/os-desktop/src-tauri
        run: cargo check

      - name: "Phase B: cargo build (Tauri shell)"
        working-directory: apps/os-desktop/src-tauri
        run: cargo build

      # ── Phase C: Build real service binary ──────────────────────────────
      - name: "Phase C: Build OS service (debug)"
        working-directory: services/os-service
        run: cargo build

      # ── Validation: Full bridge test ────────────────────────────────────
      - name: "Validate: Tauri bridge + service integration"
        run: |
          node scripts/validate-tauri-bridge.mjs --service-path services/os-service/target/debug/redcore-os-service.exe

      # ── TypeScript: Platform adapters compile ───────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: "TypeScript: platform adapters compile"
        working-directory: apps/os-desktop
        run: pnpm exec tsc --noEmit

  build-tauri-installer:
    name: Tauri Installer Build (Windows)
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/os-desktop/src-tauri/target
            services/os-service/target
          key: tauri-installer-${{ hashFiles('apps/os-desktop/src-tauri/Cargo.toml', 'services/os-service/Cargo.toml') }}
          restore-keys: tauri-installer-

      - name: Build OS service (release)
        working-directory: services/os-service
        run: cargo build --release

      - name: Build renderer
        working-directory: apps/os-desktop
        run: pnpm build

      - name: Build Tauri installer
        working-directory: apps/os-desktop/src-tauri
        run: cargo tauri build --config tauri.conf.production.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Verify installer exists
        run: |
          $installer = Get-ChildItem -Path apps/os-desktop/src-tauri/target/release/bundle/nsis -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($installer) {
            Write-Host "Installer: $($installer.Name) ($([math]::Round($installer.Length / 1MB, 1)) MB)"
          } else {
            Write-Host "ERROR: No installer found"
            exit 1
          }

      - name: Upload Tauri installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-os-installer
          path: apps/os-desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  validate-tauri-macos:
    name: Tauri macOS Check (compile only)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (Tauri shell)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/os-desktop/src-tauri/target
          key: tauri-macos-${{ hashFiles('apps/os-desktop/src-tauri/Cargo.toml') }}
          restore-keys: tauri-macos-

      - name: "cargo check (macOS)"
        working-directory: apps/os-desktop/src-tauri
        run: cargo check
