name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build Rust service
        run: cargo build --release --manifest-path services/os-service/Cargo.toml
      - name: Install desktop dependencies
        run: pnpm install --dir apps/os-desktop --frozen-lockfile=false
      - name: Build desktop app
        run: pnpm --dir apps/os-desktop run build
      - name: Package installer
        run: pnpm --dir apps/os-desktop run dist
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/os-desktop/dist/installers/redcore-os-setup.exe
          generate_release_notes: true
