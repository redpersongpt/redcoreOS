name: Build Windows Installers

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'apps/os-desktop/**'
      - 'apps/tuning-desktop/**'
      - 'services/os-service/**'
      - 'services/tuning-service/**'
      - 'packages/os-shared-schema/**'
      - 'playbooks/**'
      - 'scripts/validate-action-parity.mjs'
      - 'scripts/build-and-publish-os-release.sh'
      - '.github/workflows/build-installers.yml'
  push:
    branches: [main]
    paths:
      - 'apps/os-desktop/**'
      - 'apps/tuning-desktop/**'
      - 'services/os-service/**'
      - 'services/tuning-service/**'
      - 'packages/os-shared-schema/**'
      - 'playbooks/**'
      - 'scripts/validate-action-parity.mjs'
      - 'scripts/build-and-publish-os-release.sh'
      - '.github/workflows/build-installers.yml'

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Structural Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Verify (parity + typecheck)
        run: pnpm verify:full

  check-rust:
    name: Rust Check (Linux cross-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/os-service/target
            services/tuning-service/target
          key: rust-linux-check-${{ hashFiles('services/*/Cargo.toml') }}
          restore-keys: rust-linux-check-

      - name: cargo check os-service
        working-directory: services/os-service
        run: cargo check 2>&1

      - name: cargo check tuning-service
        working-directory: services/tuning-service
        run: cargo check 2>&1

  build-rust-services:
    name: Build Rust Services (Windows)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/os-service/target
            services/tuning-service/target
          key: rust-windows-${{ hashFiles('services/*/Cargo.lock', 'services/*/Cargo.toml') }}
          restore-keys: rust-windows-

      - name: Build OS service (release)
        working-directory: services/os-service
        run: cargo build --release

      - name: Build Tuning service (release)
        working-directory: services/tuning-service
        run: cargo build --release

      - name: Upload OS service binary
        uses: actions/upload-artifact@v4
        with:
          name: os-service-binary
          path: services/os-service/target/release/redcore-os-service.exe
          retention-days: 7

      - name: Upload Tuning service binary
        uses: actions/upload-artifact@v4
        with:
          name: tuning-service-binary
          path: services/tuning-service/target/release/redcore-service.exe
          retention-days: 7

  build-os-installer:
    name: Package redcore OS Installer
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    needs: [verify, check-rust, build-rust-services]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Download OS service binary
        uses: actions/download-artifact@v4
        with:
          name: os-service-binary
          path: services/os-service/target/release/

      - name: Build Electron app
        working-directory: apps/os-desktop
        run: pnpm build

      - name: Package installer
        working-directory: apps/os-desktop
        run: pnpm dist
        env:
          CI: "true"

      - name: Verify OS installer size
        shell: pwsh
        run: |
          $size = (Get-Item "apps/os-desktop/dist/installers/redcore-os-setup.exe").Length
          if ($size -lt 20000000) {
            throw "OS installer too small: $size bytes"
          }

      - name: Upload OS installer
        uses: actions/upload-artifact@v4
        with:
          name: redcore-os-installer
          path: apps/os-desktop/dist/installers/redcore-os-setup.exe
          retention-days: 30

  build-tuning-installer:
    name: Package redcore Tuning Installer
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    needs: [verify, check-rust, build-rust-services]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Download Tuning service binary
        uses: actions/download-artifact@v4
        with:
          name: tuning-service-binary
          path: services/tuning-service/target/release/

      - name: Build Electron app
        working-directory: apps/tuning-desktop
        run: pnpm build

      - name: Package installer
        working-directory: apps/tuning-desktop
        run: pnpm dist
        env:
          CI: "true"

      - name: Upload Tuning installer
        uses: actions/upload-artifact@v4
        with:
          name: redcore-tuning-installer
          path: apps/tuning-desktop/dist/installers/redcore-tuning-setup.exe
          retention-days: 30

  deploy-to-vds:
    name: Deploy Installers to VDS
    runs-on: ubuntu-latest
    needs: [build-os-installer]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download OS installer
        uses: actions/download-artifact@v4
        with:
          name: redcore-os-installer
          path: ./artifacts/os/

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VDS_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add known hosts
        run: ssh-keyscan -H REDACTED_VDS_IP >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload OS installer to VDS
        run: |
          VERSION=$(node -p "require('./apps/os-desktop/package.json').version")
          SHA=$(sha256sum ./artifacts/os/redcore-os-setup.exe | awk '{print $1}')
          COMMIT_SHA="${GITHUB_SHA::7}"
          RELEASE_NAME="redcore-os-${VERSION}-${COMMIT_SHA}.exe"
          SIZE=$(stat -c %s ./artifacts/os/redcore-os-setup.exe)
          BUILT_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p ./artifacts/os/publish
          cp ./artifacts/os/redcore-os-setup.exe ./artifacts/os/publish/redcore-os-setup.exe
          cp ./artifacts/os/redcore-os-setup.exe "./artifacts/os/publish/${RELEASE_NAME}"

          cat > ./artifacts/os/publish/latest.json <<JSON
          {
            "product": "redcore-os",
            "channel": "latest",
            "version": "${VERSION}",
            "versionTag": "v${VERSION}-${COMMIT_SHA}",
            "commit": "${COMMIT_SHA}",
            "builtAt": "${BUILT_AT}",
            "filename": "redcore-os-setup.exe",
            "releaseFilename": "${RELEASE_NAME}",
            "sizeBytes": ${SIZE},
            "sha256": "${SHA}",
            "url": "https://redcoreos.net/downloads/os/redcore-os-setup.exe",
            "releaseUrl": "https://redcoreos.net/downloads/os/releases/${RELEASE_NAME}"
          }
          JSON

          ssh -o StrictHostKeyChecking=no ubuntu@REDACTED_VDS_IP "mkdir -p /var/www/redcore-downloads/os/releases /var/www/redcore-downloads/os/archive"
          scp -o StrictHostKeyChecking=no ./artifacts/os/publish/redcore-os-setup.exe ubuntu@REDACTED_VDS_IP:/var/www/redcore-downloads/os/
          scp -o StrictHostKeyChecking=no "./artifacts/os/publish/${RELEASE_NAME}" ubuntu@REDACTED_VDS_IP:/var/www/redcore-downloads/os/releases/
          scp -o StrictHostKeyChecking=no ./artifacts/os/publish/latest.json ubuntu@REDACTED_VDS_IP:/var/www/redcore-downloads/os/

      - name: Verify upload
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@REDACTED_VDS_IP "ls -lh /var/www/redcore-downloads/os/redcore-os-setup.exe /var/www/redcore-downloads/os/latest.json && cat /var/www/redcore-downloads/os/latest.json"
