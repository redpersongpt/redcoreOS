name: Build Windows Installers

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'apps/os-desktop/**'
      - 'apps/tuning-desktop/**'
      - 'services/os-service/**'
      - 'services/tuning-service/**'
      - 'packages/os-shared-schema/**'
      - 'playbooks/**'
      - 'scripts/validate-action-parity.mjs'
      - 'scripts/build-and-publish-os-release.sh'
      - '.github/workflows/build-installers.yml'
  push:
    branches: [main]
    paths:
      - 'apps/os-desktop/**'
      - 'apps/tuning-desktop/**'
      - 'services/os-service/**'
      - 'services/tuning-service/**'
      - 'packages/os-shared-schema/**'
      - 'playbooks/**'
      - 'scripts/validate-action-parity.mjs'
      - 'scripts/build-and-publish-os-release.sh'
      - '.github/workflows/build-installers.yml'

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Structural Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Verify (parity + typecheck)
        run: pnpm verify:full

  check-rust:
    name: Rust Build + Smoke (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/os-service/target
            services/tuning-service/target
          key: rust-windows-debug-${{ hashFiles('services/*/Cargo.toml') }}
          restore-keys: rust-windows-debug-

      - name: Build OS service (debug)
        working-directory: services/os-service
        run: cargo build

      - name: Build Tuning service (debug)
        working-directory: services/tuning-service
        run: cargo build

      - name: Run OS service smoke test
        run: node scripts/smoke-test-os-service.mjs services/os-service/target/debug/redcore-os-service.exe

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Build Electron app (renderer + main + preload)
        working-directory: apps/os-desktop
        run: pnpm build

      - name: Run desktop smoke test (Electron + real service)
        working-directory: apps/os-desktop
        run: npx electron test/smoke-desktop.mjs --service-path ../../services/os-service/target/debug/redcore-os-service.exe

  build-rust-services:
    name: Build Rust Services (Windows)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/os-service/target
            services/tuning-service/target
          key: rust-windows-${{ hashFiles('services/*/Cargo.lock', 'services/*/Cargo.toml') }}
          restore-keys: rust-windows-

      - name: Build OS service (release)
        working-directory: services/os-service
        run: cargo build --release

      - name: Build Tuning service (release)
        working-directory: services/tuning-service
        run: cargo build --release

      - name: Upload OS service binary
        uses: actions/upload-artifact@v4
        with:
          name: os-service-binary
          path: services/os-service/target/release/redcore-os-service.exe
          retention-days: 7

      - name: Upload Tuning service binary
        uses: actions/upload-artifact@v4
        with:
          name: tuning-service-binary
          path: services/tuning-service/target/release/redcore-service.exe
          retention-days: 7

  build-os-installer:
    name: Package redcore OS Installer
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    needs: [verify, check-rust, build-rust-services]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Download OS service binary
        uses: actions/download-artifact@v4
        with:
          name: os-service-binary
          path: services/os-service/target/release/

      - name: Build Electron app
        working-directory: apps/os-desktop
        run: pnpm build

      - name: Package installer
        working-directory: apps/os-desktop
        run: pnpm dist
        env:
          CI: "true"

      - name: Verify OS installer size
        shell: pwsh
        run: |
          $size = (Get-Item "apps/os-desktop/dist/installers/redcore-os-setup.exe").Length
          if ($size -lt 20000000) {
            throw "OS installer too small: $size bytes"
          }

      - name: Upload OS installer
        uses: actions/upload-artifact@v4
        with:
          name: redcore-os-installer
          path: apps/os-desktop/dist/installers/redcore-os-setup.exe
          retention-days: 30

  build-tuning-installer:
    name: Package redcore Tuning Installer
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    needs: [verify, check-rust, build-rust-services]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Download Tuning service binary
        uses: actions/download-artifact@v4
        with:
          name: tuning-service-binary
          path: services/tuning-service/target/release/

      - name: Build Electron app
        working-directory: apps/tuning-desktop
        run: pnpm build

      - name: Package installer
        working-directory: apps/tuning-desktop
        run: pnpm dist
        env:
          CI: "true"

      - name: Upload Tuning installer
        uses: actions/upload-artifact@v4
        with:
          name: redcore-tuning-installer
          path: apps/tuning-desktop/dist/installers/redcore-tuning-setup.exe
          retention-days: 30

  deploy-to-vds:
    name: Deploy Installers to VDS
    runs-on: ubuntu-latest
    needs: [build-os-installer]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download OS installer
        uses: actions/download-artifact@v4
        with:
          name: redcore-os-installer
          path: ./artifacts/os/

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VDS_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add known hosts
        run: ssh-keyscan -H REDACTED_VDS_IP >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare release artifacts
        id: prep
        run: |
          VERSION=$(node -p "require('./apps/os-desktop/package.json').version")
          SHA=$(sha256sum ./artifacts/os/redcore-os-setup.exe | awk '{print $1}')
          COMMIT_SHA="${GITHUB_SHA::7}"
          RELEASE_NAME="redcore-os-${VERSION}-${COMMIT_SHA}.exe"
          SIZE=$(stat -c %s ./artifacts/os/redcore-os-setup.exe)
          BUILT_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p ./artifacts/os/publish

          cp ./artifacts/os/redcore-os-setup.exe ./artifacts/os/publish/redcore-os-setup.exe
          cp ./artifacts/os/redcore-os-setup.exe "./artifacts/os/publish/${RELEASE_NAME}"

          cat > ./artifacts/os/publish/latest.json <<JSON
          {
            "product": "redcore-os",
            "channel": "latest",
            "version": "${VERSION}",
            "versionTag": "v${VERSION}-${COMMIT_SHA}",
            "commit": "${COMMIT_SHA}",
            "builtAt": "${BUILT_AT}",
            "filename": "redcore-os-setup.exe",
            "releaseFilename": "${RELEASE_NAME}",
            "sizeBytes": ${SIZE},
            "sha256": "${SHA}",
            "url": "https://redcoreos.net/downloads/os/redcore-os-setup.exe",
            "releaseUrl": "https://redcoreos.net/downloads/os/releases/${RELEASE_NAME}"
          }
          JSON

          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "SHA=${SHA}" >> "$GITHUB_OUTPUT"
          echo "SIZE=${SIZE}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload installer (before manifest)
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@REDACTED_VDS_IP "mkdir -p /var/www/redcore-downloads/os/releases /var/www/redcore-downloads/os/archive"
          scp -o StrictHostKeyChecking=no ./artifacts/os/publish/redcore-os-setup.exe ubuntu@REDACTED_VDS_IP:/var/www/redcore-downloads/os/
          scp -o StrictHostKeyChecking=no "./artifacts/os/publish/${{ steps.prep.outputs.RELEASE_NAME }}" ubuntu@REDACTED_VDS_IP:/var/www/redcore-downloads/os/releases/

      - name: Verify installer reachable over HTTPS
        run: |
          echo "Checking installer is publicly reachable..."

          # Verify main installer URL returns 200 and correct size
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://redcoreos.net/downloads/os/redcore-os-setup.exe")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: Installer URL returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "PASS: Installer returns HTTP 200"

          # Verify content-length matches expected size
          REMOTE_SIZE=$(curl -sI "https://redcoreos.net/downloads/os/redcore-os-setup.exe" | grep -i content-length | awk '{print $2}' | tr -d '\r')
          EXPECTED_SIZE="${{ steps.prep.outputs.SIZE }}"
          if [ -n "$REMOTE_SIZE" ] && [ "$REMOTE_SIZE" != "$EXPECTED_SIZE" ]; then
            echo "WARN: Size mismatch — remote=$REMOTE_SIZE expected=$EXPECTED_SIZE"
          else
            echo "PASS: Size matches ($REMOTE_SIZE bytes)"
          fi

          # Download and verify SHA-256
          curl -s -o /tmp/verify-installer.exe "https://redcoreos.net/downloads/os/redcore-os-setup.exe"
          DOWNLOAD_SHA=$(sha256sum /tmp/verify-installer.exe | awk '{print $1}')
          EXPECTED_SHA="${{ steps.prep.outputs.SHA }}"
          if [ "$DOWNLOAD_SHA" != "$EXPECTED_SHA" ]; then
            echo "FAIL: SHA-256 mismatch"
            echo "  expected: $EXPECTED_SHA"
            echo "  got:      $DOWNLOAD_SHA"
            exit 1
          fi
          echo "PASS: SHA-256 verified ($DOWNLOAD_SHA)"
          rm -f /tmp/verify-installer.exe

      - name: Publish latest.json (after installer verified)
        run: |
          scp -o StrictHostKeyChecking=no ./artifacts/os/publish/latest.json ubuntu@REDACTED_VDS_IP:/var/www/redcore-downloads/os/

      - name: Verify latest.json reachable and coherent
        run: |
          echo "Checking latest.json is publicly reachable and coherent..."

          # Fetch latest.json over HTTPS
          HTTP_CODE=$(curl -s -o /tmp/verify-latest.json -w "%{http_code}" "https://redcoreos.net/downloads/os/latest.json")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: latest.json returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "PASS: latest.json returns HTTP 200"

          # Verify manifest fields match what we published
          MANIFEST_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/verify-latest.json','utf8')).version")
          MANIFEST_SHA=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/verify-latest.json','utf8')).sha256")
          MANIFEST_URL=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/verify-latest.json','utf8')).url")

          EXPECTED_VERSION="${{ steps.prep.outputs.VERSION }}"
          EXPECTED_SHA="${{ steps.prep.outputs.SHA }}"

          if [ "$MANIFEST_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "FAIL: Manifest version mismatch — got $MANIFEST_VERSION, expected $EXPECTED_VERSION"
            exit 1
          fi
          echo "PASS: Manifest version matches ($MANIFEST_VERSION)"

          if [ "$MANIFEST_SHA" != "$EXPECTED_SHA" ]; then
            echo "FAIL: Manifest SHA mismatch — got $MANIFEST_SHA, expected $EXPECTED_SHA"
            exit 1
          fi
          echo "PASS: Manifest SHA matches"

          if [ "$MANIFEST_URL" != "https://redcoreos.net/downloads/os/redcore-os-setup.exe" ]; then
            echo "FAIL: Manifest URL unexpected — $MANIFEST_URL"
            exit 1
          fi
          echo "PASS: Manifest URL correct"

          rm -f /tmp/verify-latest.json
          echo ""
          echo "Release artifact verification complete."
